services:
  - type: web
    name: snap-dashboard-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: snap-dashboard-db
          property: connectionString
      - key: SNAP_CLIENT_ID
        sync: false
      - key: SNAP_CLIENT_SECRET
        sync: false
      - key: REDIRECT_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE_HOURS
        value: "24"
      - key: FRONTEND_URL
        sync: false

databases:
  - name: snap-dashboard-db
    plan: free
